name: Build GHCR image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/aottg-2/aottg2-workshop-frontend

jobs:
  build-image:
    name: Lint, build, and push image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Use HTTPS for GitHub npm dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build app
        run: npm run build
        env:
          NEXT_PUBLIC_AUTH_API_BASE_URL: https://aottg2.com
          NEXT_PUBLIC_AUTH_FRONTEND_BASE_URL: https://aottg2.com
          NEXT_PUBLIC_WORKSHOP_API_BASE_URL: https://workshop.aottg2.com
          NEXT_PUBLIC_SITE_URL: https://workshop.aottg2.com

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          build-args: |
            NEXT_PUBLIC_AUTH_API_BASE_URL=https://aottg2.com
            NEXT_PUBLIC_AUTH_FRONTEND_BASE_URL=https://aottg2.com
            NEXT_PUBLIC_WORKSHOP_API_BASE_URL=https://workshop.aottg2.com
            NEXT_PUBLIC_SITE_URL=https://workshop.aottg2.com
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:main
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
